<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Комерційний облік: Точки обліку</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    
    <div id="loginScreen" class="login-screen">
        <div class="card login-card">
            <div class="header-logo" style="justify-content: center; margin-bottom: 24px;">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#A0522D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                <h2 style="color: var(--secondary); font-size: 24px;">Вхід у систему</h2>
            </div>
            <form id="loginForm" class="modern-form">
                <div class="input-group">
                    <label>Логін</label>
                    <input type="text" id="username" required placeholder="Введіть admin">
                </div>
                <div class="input-group">
                    <label>Пароль</label>
                    <input type="password" id="password" required placeholder="Введіть 12345">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Увійти</button>
                <div id="loginError" class="message error" style="margin-top: 15px;"></div>
            </form>
        </div>
    </div>

    <div class="app-container hidden" id="mainApp">
        <header class="app-header">
            <div class="header-logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#A0522D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                <h1>Комерційний облік енергії</h1>
            </div>
            <button id="logoutBtn" class="btn-logout">Вийти з системи</button>
        </header>

        <main class="main-content">
            <section class="card form-card">
                <div class="card-header">
                    <h2>Реєстрація точки обліку</h2>
                    <p class="subtitle">Введіть дані для створення нового запису</p>
                </div>
                <form id="accountingForm" class="modern-form">
                    <div class="form-row">
                        <div class="input-group">
                            <label>Номер точки <span class="required">*</span></label>
                            <input type="text" name="pointNumber" required placeholder="Напр: 10293847">
                        </div>
                        <div class="input-group">
                            <label>Об'єкт <span class="required">*</span></label>
                            <input type="text" name="objectName" required placeholder="Назва або адреса">
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Лічильник (Тип та s/n) <span class="required">*</span></label>
                        <input type="text" name="meterDetails" required placeholder="Напр: NIK 2102-02, 123456">
                    </div>
                    <div class="form-row">
                        <div class="input-group">
                            <label>Наступна повірка <span class="required">*</span></label>
                            <input type="date" name="verificationDate" required>
                        </div>
                    </div>
                    <div class="input-group control-group">
                        <label class="checkbox-container">
                            <input type="checkbox" name="underControl" value="yes">
                            <span class="checkmark"></span>
                            <span class="checkbox-label">Взяти на особливий контроль</span>
                        </label>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Зберегти точку</button>
                        <button type="reset" class="btn btn-outline">Очистити</button>
                    </div>
                </form>
                <div id="message" class="message"></div>
            </section>
            
            <section class="card list-card">
                <div class="card-header list-header" style="margin-bottom: 16px; padding-bottom: 16px;">
                    <div class="list-title-group">
                        <h2>Зареєстровані точки</h2>
                        <p class="subtitle">Список наявних об'єктів</p>
                    </div>
                    <div class="list-controls">
                        <div class="search-input-wrapper">
                            <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                            <input type="text" id="searchInput" placeholder="Пошук за номером...">
                        </div>
                        <button id="filterOverdueBtn" class="btn btn-warning">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                            Прострочені
                        </button>
                    </div>
                </div>
                <div class="dashboard-charts">
                    <div class="chart-container"><canvas id="statusChart"></canvas></div>
                    <div class="chart-container"><canvas id="controlChart"></canvas></div>
                </div>
                <div class="export-controls">
                    <span class="export-label">Завантажити звіт:</span>
                    <button class="btn-export" onclick="exportCSV()">CSV</button>
                    <button class="btn-export" onclick="exportExcel()">Excel</button>
                    <button class="btn-export" onclick="exportPDF()">PDF</button>
                </div>
                <div id="accountingPointsList" class="points-list"></div>
                <div id="paginationContainer" class="pagination-container"></div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
