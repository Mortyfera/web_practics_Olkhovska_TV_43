<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Панель управління ВДЕ</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark px-4 shadow-sm">
        <span class="navbar-brand mb-0 h1">⚡ Renewable Energy System v1.0</span>
        <button onclick="logout()" class="btn btn-outline-light btn-sm">Вийти з системи</button>
    </nav>

    <div class="container mt-5">
        <div class="card border-0 shadow-sm p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h3 class="mb-1">Вітаємо, <span id="userName" class="text-primary">Завантаження...</span>!</h3>
                    <p class="mb-0 text-muted">Ваша роль: <strong id="userRole" class="text-dark">...</strong></p>
                </div>
            </div>
            <hr>
            
            <h5 class="mb-3">Доступні операції моніторингу:</h5>
            <div class="row g-3 mb-4" id="controls">
                <div class="col-md-4 d-none" id="cardSolar">
                    <button class="btn btn-warning w-100 py-3 fw-bold shadow-sm" onclick="fetchData('solar')">
                        ☀️ Моніторинг СЕС
                    </button>
                </div>
                <div class="col-md-4 d-none" id="cardWind">
                    <button class="btn btn-info w-100 py-3 fw-bold text-white shadow-sm" onclick="fetchData('wind')">
                        🌬️ Моніторинг ВЕС
                    </button>
                </div>
                <div class="col-md-4 d-none" id="cardAdjust">
                    <button class="btn btn-danger w-100 py-3 fw-bold shadow-sm" onclick="adjustBalance()">
                        ⚖️ Коригувати баланс
                    </button>
                </div>
            </div>

            <div class="p-3 bg-dark text-light border rounded shadow-sm">
                <strong class="text-success">Результат запиту до API:</strong>
                <pre id="apiResult" class="mt-2 mb-0 text-white">Натисніть кнопку вище для отримання даних...</pre>
            </div>
        </div>
    </div>

    <script>
        const roleNames = {
            'solar_engineer': 'Інженер сонячних станцій',
            'wind_engineer': 'Інженер вітрових станцій',
            'coordinator': 'Координатор балансу'
        };

        async function loadProfile() {
            try {
                const res = await fetch('/auth/status');
                if (!res.ok) throw new Error('Не авторизовано');
                
                const data = await res.json();
                if (data.authenticated) {
                    document.getElementById('userName').innerText = data.user.name;
                    document.getElementById('userRole').innerText = roleNames[data.user.role] || data.user.role;
                    setupUI(data.user.role);
                } else {
                    window.location.href = '/login.html';
                }
            } catch (err) {
                window.location.href = '/login.html';
            }
        }

        function setupUI(role) {
            if (role === 'solar_engineer' || role === 'coordinator') {
                document.getElementById('cardSolar').classList.remove('d-none');
            }
            if (role === 'wind_engineer' || role === 'coordinator') {
                document.getElementById('cardWind').classList.remove('d-none');
            }
            if (role === 'coordinator') {
                document.getElementById('cardAdjust').classList.remove('d-none');
            }
        }

        async function fetchData(type) {
            const resultBox = document.getElementById('apiResult');
            resultBox.innerText = "Завантаження даних...";
            try {
                const res = await fetch(`/api/v1/${type}/generation`);
                
                if (!res.ok) {
                    const errText = await res.text();
                    throw new Error(`Код ${res.status}: ${errText}`);
                }
                
                const data = await res.json();
                resultBox.innerText = JSON.stringify(data, null, 2);
            } catch (error) {
                resultBox.innerText = "❌ Помилка: " + error.message;
            }
        }

        async function adjustBalance() {
            const resultBox = document.getElementById('apiResult');
            resultBox.innerText = "Коригування...";
            try {
                const csrfRes = await fetch('/api/csrf-token');
                const { csrfToken } = await csrfRes.json();

                const res = await fetch('/api/v1/balance/adjust', { 
                    method: 'POST',
                    headers: { 'CSRF-Token': csrfToken }
                });
                
                if (!res.ok) {
                    const errText = await res.text();
                    throw new Error(`Код ${res.status}: ${errText}`);
                }

                const data = await res.json();
                resultBox.innerText = JSON.stringify(data, null, 2);
            } catch (error) {
                resultBox.innerText = "❌ Помилка: " + error.message;
            }
        }

        async function logout() {
            const csrfRes = await fetch('/api/csrf-token');
            const { csrfToken } = await csrfRes.json();

            await fetch('/auth/logout', { 
                method: 'POST',
                headers: { 'CSRF-Token': csrfToken }
            });
            window.location.href = '/login.html';
        }

        loadProfile();
    </script>
</body>
</html>
