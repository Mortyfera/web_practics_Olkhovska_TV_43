<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Вхід - ВДЕ Платформа</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4 card p-4 shadow">
                <h2 class="text-center mb-4">Вхід</h2>
                <form id="loginForm">
                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Пароль</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Увійти</button>
                </form>
                <p class="mt-3 text-center">Немає аккаунту? <a href="/register.html">Реєстрація</a></p>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();

            const csrfRes = await fetch('/api/csrf-token');
            const { csrfToken } = await csrfRes.json();

            const formData = Object.fromEntries(new FormData(e.target));
            const res = await fetch('/auth/login', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'CSRF-Token': csrfToken
                },
                body: JSON.stringify(formData)
            });
            
            if (res.ok) {
                window.location.href = '/dashboard.html';
            } else {
                const data = await res.json();
                alert(data.error || 'Невірні дані або помилка CSRF');
            }
        };
    </script>
</body>
</html>
