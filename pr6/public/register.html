<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Реєстрація - ВДЕ Платформа</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5 card p-4 shadow">
                <h2 class="text-center mb-4">Реєстрація інженера ВДЕ</h2>
                <form id="regForm">
                    <div class="mb-3">
                        <label>ПІБ</label>
                        <input type="text" name="name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Пароль (мін. 8 символів)</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Роль у системі</label>
                        <select name="role" class="form-select">
                            <option value="solar_engineer">Інженер сонячних станцій</option>
                            <option value="wind_engineer">Інженер вітрових станцій</option>
                            <option value="coordinator">Координатор балансу</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Зареєструватися</button>
                </form>
                <p class="mt-3 text-center">Вже є аккаунт? <a href="/login.html">Увійти</a></p>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('regForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const csrfRes = await fetch('/api/csrf-token');
            const { csrfToken } = await csrfRes.json();

            const formData = Object.fromEntries(new FormData(e.target));
            const res = await fetch('/auth/register', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'CSRF-Token': csrfToken
                },
                body: JSON.stringify(formData)
            });
            
            const data = await res.json();
            if (res.ok) {
                alert('Реєстрація успішна!');
                window.location.href = '/login.html';
            } else {
                alert(data.error || 'Помилка валідації');
            }
        };
    </script>
</body>
</html>
